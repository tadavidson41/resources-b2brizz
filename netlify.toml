# Netlify config for the B2B Rizz resources site
[build]
  publish = "."

[[redirects]]
  from = "/top-6-linkedin-ads-agencies-b2b-saas/*"
  to = "/best-linkedin-ads-agencies-b2b-saas/"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
